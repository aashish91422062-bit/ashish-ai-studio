<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ashish AI Studio - AI Chat</title>

<link rel="stylesheet" href="chat.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<button id="menuBtn" class="icon-btn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="logo">

<div class="logo-icon">🤖</div>

<div class="logo-text">
<h2>Ashish AI Studio</h2>
<p>AI Assistant</p>
</div>

</div>

<div class="header-right">

<button id="clearChatBtn" class="icon-btn">
<i class="fa-solid fa-trash"></i>
</button>

<button id="profileBtn" class="icon-btn">
<i class="fa-solid fa-user"></i>
</button>

</div>

</header>

<main id="chatBox" class="chat-box">

<div class="welcome">

<h2>👋 Welcome Ashish</h2>

<p>Ask anything to your AI Assistant.</p>

</div>

</main>

<form id="chatForm" class="chat-input">

<button type="button" id="voiceBtn" class="circle-btn">

<i class="fa-solid fa-microphone"></i>

</button>

<input
id="userInput"
type="text"
placeholder="Type your message..."
autocomplete="off"
required>

<button type="submit" id="sendBtn" class="circle-btn">

<i class="fa-solid fa-paper-plane"></i>

</button>

</form>

<script src="chat.js"></script>

</body>

</html>
