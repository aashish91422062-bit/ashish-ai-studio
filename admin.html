<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ashish AI Studio - Admin Panel</title>

<link rel="stylesheet" href="admin.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">

🤖 Ashish AI Studio

</div>

<div class="admin-text">

Admin Panel

</div>

</header>

<div class="container">

<div class="card">

<h2>🔐 Admin Login</h2>

<input
type="password"
id="adminPassword"
placeholder="Enter Admin Password">

<button id="loginBtn">

Login

</button>

</div>

<div class="card" id="teachPanel">

<h2>📚 Teach AI</h2>

<input
type="text"
id="question"
placeholder="Enter Question">

<textarea
id="answer"
placeholder="Enter Answer"></textarea>

<button id="saveBtn">

💾 Save Knowledge

</button>

</div>

<div class="card">

<h2>📖 Knowledge Database</h2>

<div id="knowledgeList">

No Knowledge Added

</div>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
